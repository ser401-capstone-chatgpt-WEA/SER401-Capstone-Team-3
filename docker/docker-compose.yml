services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: pbs-warn-scraper
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--ssh --funnel=443
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ts_state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
  scraper:
    build:
      context: ..
      dockerfile: Dockerfile
    network_mode: service:tailscale
    volumes:
      - ../pbs_warn_outputs:/app/pbs_warn_outputs
    depends_on:
      - tailscale

  rag:
    build:
      context: ..
      dockerfile: ./docker/rag-service.Dockerfile
    network_mode: service:tailscale
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ../chroma_db:/app/chroma_db
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  ts_state:
