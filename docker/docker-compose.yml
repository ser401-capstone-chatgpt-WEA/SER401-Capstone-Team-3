services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: pbs-warn-scraper
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--ssh --funnel=8000
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts_state:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  scraper:
    build:
      context: ..
      dockerfile: Dockerfile
    network_mode: service:tailscale
    volumes:
      - ../pbs_warn_outputs:/app/pbs_warn_outputs
    depends_on:
      - tailscale
    restart: unless-stopped

  rag:
    build:
      context: ..
      dockerfile: ./docker/rag-service.Dockerfile
    network_mode: bridge
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - ../chroma_db:/app/chroma_db
    depends_on:
      - tailscale
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ts_state:

